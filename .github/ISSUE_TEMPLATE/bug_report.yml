name: Bug report
description: Something isn't working correctly
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: Thanks for taking the time to file a bug report!

  - type: input
    id: version
    attributes:
      label: postmortem version
      description: Output of `postmortem --version`
    validations:
      required: true

  - type: input
    id: python
    attributes:
      label: Python version
      description: Output of `python3 --version`
    validations:
      required: true

  - type: textarea
    id: command
    attributes:
      label: Command run
      description: The exact command you ran
      placeholder: postmortem --since 2h
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behaviour
      description: Include the full error output if applicable
    validations:
      required: true
