name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install ruff
        run: pip install ruff
      - name: Run ruff
        run: ruff check postmortem tests

  test:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install project + dev deps
        run: pip install -e ".[dev]"

      - name: Configure git (needed for integration tests)
        run: |
          git config --global user.email "ci@postmortem.dev"
          git config --global user.name "CI Bot"

      - name: Run tests with coverage
        run: pytest tests/ --cov=postmortem --cov-report=xml --cov-report=term

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: coverage.xml
          fail_ci_if_error: false

  install-script:
    name: Test install.sh
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Run install script
        run: |
          chmod +x install.sh
          bash install.sh
      - name: Smoke test binary
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          postmortem --version
          postmortem --since 1m --repo . || true
